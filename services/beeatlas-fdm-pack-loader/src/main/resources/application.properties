app.version=@project.version@
app.name=@project.name@
app.ambassador-auth=true
spring.mvc.pathmatch.matching-strategy = ant_path_matcher
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.c3p0.min_size=3
spring.jpa.properties.hibernate.c3p0.max_size=20
spring.jpa.properties.hibernate.c3p0.timeout=5000
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.show_sql=true
spring.jpa.properties.hibernate.default_schema=pack_loader
spring.flyway.default-schema=pack_loader
spring.flyway.baseline-on-migrate = true
spring.flyway.clean-disabled=true
management.metrics.web.server.auto-time-requests=true
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.percentiles-histogram.http.client.requests=true
queue.tech-capability.name=tech_capability_queue
queue.business-capability.name=business_capability_queue
queue.package.name=package_queue
queue.product.name=product_queue
queue.tech-product-relation.name=TECH_PRODUCT_RELATION

logging.level.io.opentelemetry.exporter.internal.http.HttpExporter=ERROR

otel.exporter.otlp.endpoint=http://otel-collector.opentelemetry:4318
otel.exporter.otlp.protocol=http/protobuf
otel.resource.attributes.host.name=@project.name@
otel.resource.attributes.service.namespace=@project.name@
otel.service.name=@project.name@
otel.instrumentation.log4j-appender.enabled=true
otel.logs.exporter=none
otel.sdk.disabled=true

