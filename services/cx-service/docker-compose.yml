
services:
  cx-service-postgres:
    image: postgres:15-alpine
    container_name: cx-service-postgres
    environment:
      POSTGRES_DB: ${CX_POSTGRES_DB:-cx_service}
      POSTGRES_USER: ${CX_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${CX_POSTGRES_PASSWORD:-postgres}
    ports:
      - "${CX_SERVICE_POSTGRES_NODEPORT:-5432}:5432"
    volumes:
      - cx-service-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CX_POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - beeatlas-network

  cx-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cx-service
    depends_on:
      products-service-postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://${CX_POSTGRES_HOST:-cx-service-postgres}:5432/${CX_POSTGRES_DB:-cx_service}
      SPRING_DATASOURCE_USERNAME: ${CX_POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${CX_POSTGRES_PASSWORD:-postgres}
      SPRING_JPA_HIBERNATE_DDL_AUTO: none
      SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA: cx
      SPRING_FLYWAY_DEFAULT_SCHEMA: cx
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
      SPRING_FLYWAY_CLEAN_DISABLED: "true"
      INTEGRATION_CAPABILITY_SERVER_URL: "http://capability-service"
      INTEGRATION_AUTH_SERVER_URL: "http://auth-service"
      INTEGRATION_DOCUMENT_SERVER_URL: "http://document-service"
      INTEGRATION_PRODUCT_SERVER_URL: "http://product-service"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 5s
      timeout: 3s
      retries: 15
    ports:
      - "${CX_SERVICE_PORT:-8081}:8080"
    networks:
      - beeatlas-network
    restart: unless-stopped

networks:
  beeatlas-network:
    driver: bridge

volumes:
  cx-service-postgres:
